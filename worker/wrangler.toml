name = "xau-gemini-proxy"
main = "src/index.js"
compatibility_date = "2025-05-01"

# Smart Placement: Cloudflare auto-route Worker chạy gần API origin (Google US/EU)
# thay vì gần user. Mục đích: tránh Google chặn API ở 1 số quốc gia (VN, CN, HK...)
# bằng cách egress từ datacenter US/EU.
[placement]
mode = "smart"

# KV namespace cho cache phản hồi Gemini (dedup requests cùng nội dung)
[[kv_namespaces]]
binding = "CACHE"
id = "124855cf2b474b6fba71e1fc4d08681a"

# Workers AI binding — fallback khi tất cả Gemini keys fail
[ai]
binding = "AI"

# Cron Trigger — mỗi 3 phút check kỹ thuật + gửi Telegram alert nếu có.
# Tăng từ 5p → 3p để bắt signal nhanh hơn ~2p. Token/credit usage:
#   - TD ~900/1600 cap (56%) nhờ early-exit khi không có signal.
#   - Gemini RPD <2% cap (5 keys × 1500 RPD).
# Mega-move cooldown adaptive (15p khi vol regime extreme, 30p khi normal).
[triggers]
crons = ["*/3 * * * *"]

# Tăng CPU limit từ 30s mặc định → 60s. Cần thiết cho lệnh /5p15p1h, /1h4h1d
# (combo phân tích đa khung): fetch 3-5 nguồn TwelveData parallel + Gemini API
# call có thể chiếm 30-50s wall time. Hầu hết là I/O wait nên CPU thực <5s,
# nhưng để biên an toàn.
[limits]
cpu_ms = 60000

# Secret cần set bằng tay sau khi deploy:
#   npx wrangler secret put GEMINI_API_KEY_1   # rồi _2, _3, _4, _5 cho rotation
#   npx wrangler secret put TWELVEDATA_API_KEY_1   # rồi _2, _3 — free 800 credits/key/ngày
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put TELEGRAM_CHAT_ID
#   npx wrangler secret put ADMIN_SECRET              # (khuyến nghị) khóa debug routes
#   npx wrangler secret put TELEGRAM_WEBHOOK_SECRET   # (khuyến nghị) anti-spoof webhook
#
# KHÔNG để key trong file này (file này commit lên Git).
